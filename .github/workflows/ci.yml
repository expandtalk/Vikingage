name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Lint currently has a large backlog of pre-existing errors
      # (mostly no-explicit-any). Kept visible but non-blocking until
      # that debt is worked down.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
